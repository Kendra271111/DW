<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Title</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <style>
            .guestbook-card {
                max-width: 540px;
            }
            #expenselist .list-group-item {
                border: none;
                border-bottom: 1px solid #e9ecef;
                padding: 10px;
                background: transparent;
            }
            #expenselist .list-group-item:last-child {
                border-bottom: none;
            }
            #totalharga {
                min-width: 110px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>
            <ul class="nav nav-tabs bg-dark d-flex" id="navId" role="tablist">
                <li>
                    <h2
                        href="#tab1Id"
                        class="bg-dark text-white fw-bold mr-10 ms-10"
                        data-bs-toggle="tab"
                        aria-current="page"
                        >Expense Tracker</h2
                    >
                </li>
                <li class="nav-item dropdown">
                    <a
                        class="nav-link dropdown-toggle text-white"
                        data-bs-toggle="dropdown"
                        href="#"
                        role="button"
                        aria-haspopup="true"
                        aria-expanded="false"
                        >Tools</a
                    >
                    <div class="dropdown-menu">
                        <a class="dropdown-item" href="#tab2Id">Action</a>
                        <a class="dropdown-item" id="resetall" href="#tab3Id">Reset</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="#tab4Id">Login</a>
                    </div>
                </li>
                <li class="nav-item" role="presentation">
                    <a href="#tab5Id" class="nav-link text-white" data-bs-toggle="tab"
                        >Home</a
                    >
                </li>
                <!-- <li class="nav-item" role="presentation">
                    <a href="#" class="nav-link disabled" data-bs-toggle="tab"
                        >Disabled</a
                    >
                </li> -->
            </ul>
            
            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="tab1Id" role="tabpanel">
                    
                </div>
                <div class="tab-pane fade" id="tab2Id" role="tabpanel"></div>
                <div class="tab-pane fade" id="tab3Id" role="tabpanel"></div>
                <div class="tab-pane fade" id="tab4Id" role="tabpanel"></div>
                <div class="tab-pane fade" id="tab5Id" role="tabpanel"></div>
            </div>
            
            <script>
                var triggerEl = document.querySelector("#navId a");
                bootstrap.Tab.getInstance(triggerEl).show();
            </script>
        </header>
        <main>
            <div class="d-flex flex-column justify-content-between align-items-center main-container" style="min-height: 100vh;">
                <div class="row mt-5 justify-content-center align-items-start gx-5 w-100">
                    <div class="col-12 col-lg-5 mb-4">
                        <form id="myForm" class="card guestbook-card mx-auto">
                            <h3 class="card-header bg-primary text-white p-3">
                                Tambahan Pengeluaran
                            </h3>
                            <ul class="list-group list-group-flush" id="errormessage"></ul>
                            <div class="card-body mb-3">
                                <label for="NamaBarang" class="form-label">Nama Pengeluaran</label>
                                <input type="text" class="form-control" id="NamaBarang" placeholder="Contoh: Bakso" aria-describedby="nameHelp">
                            </div>
                            <div class="card-body mb-3">
                                <label for="Price" class="form-label">Harga</label>
                                <input type="number" class="form-control" id="Price" placeholder="Contoh: 10.000" aria-describedby="priceHelp">
                            </div>
                            <button type="submit" name="submit" class="btn btn-primary w-100">Simpan Data</button>
                        </form>
                    </div>
                    <div class="col-12 col-lg-5 mb-4">
                        <div class="card w-100">
                            <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white p-3">
                                <h3 class="mb-0">Daftar Pengeluaran</h3>
                                <span class="badge rounded-pill bg-white text-primary" id="totalharga">Rp 0</span>
                            </div>
                            <ul class="list-group list-group-flush" id="expenselist"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer>

        </footer>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="js/day4.js" crossorigin="anonymous"></script>
    </body>
</html>
