<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
</head>
<body>
    <Header>
        <nav class="navbar navbar-expand-lg navbar-light bg-dark text-light">
            <div class="container-fluid">
                <a class="navbar-brand text-light text-bold" href="#">Guest Book</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav text-light me-auto mb-2 mb-lg-0">
                    <li class="nav-item text-light">
                        <a class="nav-link active text-light" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item text-light">
                        <a class="nav-link text-light" href="#">About Us</a>
                    </li>
                    <li class="nav-item dropdown text-light">
                        <a class="nav-link dropdown-toggle text-light" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Others
                        </a>
                    <ul class="dropdown-menu bg-dark text-light" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item text-light" href="#">Action</a></li>
                        <li><a class="dropdown-item text-light" href="#">Members</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-light" href="#">Booking</a></li>
                    </ul>
                    </li>
                    <!-- <li class="nav-item">
                        <a class="nav-link disabled text-light" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
                    </li> -->
                </ul>
                <form class="d-flex text-light">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success text-light" type="submit">Search</button>
                </form>
                </div>
            </div>
        </nav>
    </Header>
    <Main>
        <div class="d-flex flex-column justify-content-center align-items-center main-container" style="min-height: 100vh;">
            <div class="row mt-5 justify-content-center align-items-start gx-5 w-100">
                <div class="col-12 col-lg-5 mb-4">
                    <form id="myForm" class="card guestbook-card mx-auto">
                        <div class="card-header">
                            Leave a Message
                        </div>
                        <div class="card-body mb-3">
                            <label for="InputName1" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="InputName1" placeholder="Please enter your full name" aria-describedby="nameHelp">
                        </div>
                        <div class="card-body mb-3">
                            <label for="Message1" class="form-label">Message</label>
                            <textarea class="form-control" id="Message1" rows="3" placeholder="Please enter your message"></textarea>
                        </div>
                        <button type="submit" name="submit" class="btn btn-primary w-100">Submit</button>
                    </form>
                </div>
                <div class="card col-12 col-lg-5 mb-4">
                    <div class="card-title justify-content-center align-items-center p-7">New Messages</div>
                    <div class="message-list card-container" id="messagelist"></div>
                </div>
            </div>
        </div>
    </Main>
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container-fluid">
            <ul class="list-unstyled d-flex justify-content-center gap-4 mb-0">
                <li><a href="#" class="text-white"><i class="fa-brands fa-twitter fa-lg"></i></a></li>
                <li><a href="#" class="text-white"><i class="fa-brands fa-instagram fa-lg"></i></a></li>
                <li><a href="#" class="text-white"><i class="fa-brands fa-facebook fa-lg"></i></a></li>
            </ul>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="js/day3.js" crossorigin="anonymous"></script>
</body>
</html>
