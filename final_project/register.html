<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordex Register Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 p-4">
                    <div class="card-body border border-primary rounded">
                        <h3 class="card-title text-center mb-4 fw-bold text-primary">Cordex</h3>
                        <form id="registerForm">
                            <div id="namelist"></div>
                            <div class="mb-3">
                                <label for="nameInput" class="form-label">Name</label>
                                <input type="text" class="form-control" id="nameInput" placeholder="Insert your name here" required autocomplete="name">
                            </div>
                            <div class="mb-3">
                                <label for="passwordInput" class="form-label">Password</label>
                                <input type="password" class="form-control" id="passwordInput" placeholder="Insert your password here" required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign Up</button>
                        </form>
                        <p class="text-center text-secondary small mt-4 mb-0">
                            Already have an account? <a href="login.html" class="text-decoration-none text-primary fw-medium">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/final.js"></script>
</body>
</html>
